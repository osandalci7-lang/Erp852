{% extends "base.html" %}
{% block content %}
<style>
.pg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.pg-title{font-size:18px;font-weight:600;color:#323130;}
.pg-btn{height:32px;padding:0 16px;background:#0078d4;color:white;border:none;border-radius:4px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}
.pg-btn:hover{background:#106ebe;}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px;}
.ep-card{background:#fff;border:1px solid #edebe9;border-radius:6px;overflow:hidden;margin-bottom:16px;max-width:900px;}
.ep-card-header{padding:12px 20px;border-bottom:1px solid #edebe9;font-size:13px;font-weight:600;color:#323130;}
.ep-card-body{padding:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;color:#605e5c;margin-bottom:4px;font-weight:500;}
.form-group input{width:100%;height:32px;border:1px solid #edebe9;border-radius:4px;padding:0 8px;font-size:13px;color:#323130;background:#fff;outline:none;box-sizing:border-box;}
.form-group input:focus{border-color:#0078d4;}
.form-group input[disabled]{background:#faf9f8;color:#a19f9d;}
.form-group input[type=file]{height:auto;padding:6px 8px;}
@media(max-width:900px){.settings-grid{grid-template-columns:1fr;}}
</style>

<div class="pg-header">
  <div class="pg-title">Settings</div>
  <a href="/admin/permissions" class="pg-btn">Permission Management</a>
</div>

<div class="settings-grid">
  <div class="ep-card">
    <div class="ep-card-header">Update Email</div>
    <div class="ep-card-body">
      <form method="post" action="/admin/settings/email">
        <div class="form-group"><label>Current Email</label><input type="email" value="{{ user['email'] if user and user['email'] else '' }}" disabled></div>
        <div class="form-group"><label>New Email</label><input type="email" name="email" required></div>
        <button type="submit" class="pg-btn">Update Email</button>
      </form>
    </div>
  </div>

  <div class="ep-card">
    <div class="ep-card-header">Change Password</div>
    <div class="ep-card-body">
      <form method="post" action="/admin/settings/password">
        <div class="form-group"><label>Current Password</label><input type="password" name="current_password" required></div>
        <div class="form-group"><label>New Password</label><input type="password" name="new_password" required></div>
        <div class="form-group"><label>Confirm New Password</label><input type="password" name="confirm_password" required></div>
        <button type="submit" class="pg-btn">Change Password</button>
      </form>
    </div>
  </div>
</div>

<div class="ep-card">
  <div class="ep-card-header">Upload Yard Photo</div>
  <div class="ep-card-body">
    <form method="post" action="/admin/settings/yard-photo" enctype="multipart/form-data">
      <div class="form-group"><label>Select Yard Photo</label><input type="file" name="file" accept="image/*" required></div>
      <button type="submit" class="pg-btn">Upload</button>
    </form>
  </div>
</div>

<div class="ep-card">
  <div class="ep-card-header">Upload Portal Logo</div>
  <div class="ep-card-body">
    <form method="post" action="/admin/settings/logo" enctype="multipart/form-data">
      <div class="form-group"><label>Select Logo</label><input type="file" name="file" accept="image/*" required></div>
      <button type="submit" class="pg-btn">Upload</button>
    </form>
  </div>
</div>

<div class="ep-card">
  <div class="ep-card-header">Upload Profile Photo</div>
  <div class="ep-card-body">
    <form method="post" action="/admin/settings/profile-photo" enctype="multipart/form-data">
      <div class="form-group"><label>Select Profile Photo</label><input type="file" name="file" accept="image/*" required></div>
      <button type="submit" class="pg-btn">Upload</button>
    </form>
  </div>
</div>
{% endblock %}
