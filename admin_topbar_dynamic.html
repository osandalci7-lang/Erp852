<style>
.erp-topbar *{box-sizing:border-box;}
.tb-hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:4px;color:#605e5c;}
.tb-hamburger:hover{background:#f3f2f1;}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.tb-logo-icon{width:24px;height:24px;background:#0078d4;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:600;flex-shrink:0;}
.tb-logo-name{font-size:14px;font-weight:600;color:#323130;}
.tb-logo-sub{font-size:11px;color:#605e5c;margin-left:2px;}
.tb-divider{width:1px;height:20px;background:#edebe9;flex-shrink:0;}
.tb-nav{display:flex;align-items:center;gap:2px;}
.tb-nav a{font-size:13px;color:#605e5c;text-decoration:none;padding:6px 10px;border-radius:4px;}
.tb-nav a:hover{background:#f3f2f1;color:#323130;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.tb-search{height:32px;border:1px solid #edebe9;border-radius:4px;padding:0 10px;font-size:13px;background:#faf9f8;color:#323130;width:200px;outline:none;}
.tb-search:focus{border-color:#0078d4;background:#ffffff;}
.tb-icon-btn{width:32px;height:32px;border:none;background:none;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#605e5c;text-decoration:none;}
.tb-icon-btn:hover{background:#f3f2f1;color:#323130;}
.tb-avatar{width:32px;height:32px;border-radius:50%;background:#0078d4;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:white;cursor:pointer;flex-shrink:0;}
@media(max-width:900px){
  .tb-hamburger{display:flex;}
  .tb-nav{display:none;}
  .tb-search{width:140px;}
  .tb-divider{display:none;}
}
</style>
<button class="tb-hamburger" onclick="toggleSidebar()">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect y="2" width="18" height="2" rx="1"/><rect y="8" width="18" height="2" rx="1"/><rect y="14" width="18" height="2" rx="1"/></svg>
</button>
<a href="{{ dashboard_url }}" class="tb-logo">
  <div class="tb-logo-icon">N</div>
  <span class="tb-logo-name">Norden<span class="tb-logo-sub"> ERP</span></span>
</a>
<div class="tb-divider"></div>
<nav class="tb-nav">
  <a href="{{ dashboard_url }}">Dashboard</a>
  <a href="/admin/settings">Settings</a>
</nav>
<div class="tb-right">
  <input class="tb-search" type="text" placeholder="Search...">
  <a href="/logout" class="tb-icon-btn" title="Logout">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6 2H2v12h4v-1.5H3.5v-9H6V2zm4.5 3.5L13 8l-2.5 2.5-1-1L10.5 9H6V7h4.5L9.5 6.5l1-1z"/></svg>
  </a>
  <div class="tb-avatar">{% if user and user['name'] %}{{ user['name'][:2]|upper }}{% else %}AD{% endif %}</div>
</div>
