<!DOCTYPE html>
<html lang="en">
<head>
<title>Norden ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta charset="UTF-8">
<link rel="stylesheet" href="/static/css/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f5f5;font-size:14px;color:#323130;}
.erp-shell{display:flex;flex-direction:column;min-height:100vh;}
.erp-topbar{height:48px;background:#ffffff;border-bottom:1px solid #edebe9;display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:1000;flex-shrink:0;}
.erp-layout{display:flex;flex:1;min-height:calc(100vh - 48px);}
.erp-sidebar{width:220px;background:#ffffff;border-right:1px solid #edebe9;flex-shrink:0;overflow-y:auto;padding:8px 0;}
.erp-content{flex:1;padding:24px;min-width:0;overflow-x:hidden;background:#f5f5f5;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1400;}
.sidebar-overlay.show{display:block;}
@media(max-width:900px){
  .erp-sidebar{position:fixed;top:48px;left:0;width:260px;height:calc(100vh - 48px);z-index:1500;transform:translateX(-100%);transition:transform 0.25s ease;box-shadow:4px 0 16px rgba(0,0,0,0.12);}
  .erp-sidebar.open{transform:translateX(0);}
  .erp-content{padding:16px;}
}
</style>
</head>
<body>
<div class="erp-shell">
  <div class="erp-topbar">
    {% if topbar %}{% include topbar %}{% else %}{% include "admin_topbar_dynamic.html" %}{% endif %}
  </div>
  <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="erp-layout">
    <div id="mainSidebar" class="erp-sidebar">
      {% if sidebar %}{% include sidebar %}{% else %}{% include "admin_sidebar_dynamic.html" %}{% endif %}
    </div>
    <div class="erp-content">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>
<script>
function toggleSidebar(){
  document.getElementById("mainSidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("show");
}
function closeSidebar(){
  document.getElementById("mainSidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("show");
}
</script>
</body>
</html>
